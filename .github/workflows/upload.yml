name: 🤖 Auto Video Uploader

on:
  schedule:
    # Every 5 minutes (GitHub's minimum interval)
    # Acts as a heartbeat — self-chaining handles immediate re-runs
    - cron: "*/5 * * * *"

  # Manual trigger from Actions tab (backup)
  workflow_dispatch:

# Prevent two runs from committing posted_videos.json at the same time
concurrency:
  group: video-upload
  cancel-in-progress: false   # let current run finish, queue the next

jobs:
  upload:
    name: Upload Videos (Continuous)
    runs-on: ubuntu-latest
    timeout-minutes: 30       # 25 min loop + 5 min buffer for git commit + chaining

    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 🎬 Install ffmpeg and ffprobe
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Upload videos to channel (25 min continuous loop)
        id: upload
        continue-on-error: true    # Always proceed to save state even if script crashes
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python batch_run.py

      - name: 💾 Save posted-video state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          python -c "
          import json, subprocess
          from pathlib import Path
          local_path = Path('posted_videos.json')
          remote_json = {'posted': []}
          try:
              res = subprocess.run(['git', 'show', 'origin/master:posted_videos.json'], capture_output=True, text=True)
              if res.returncode == 0:
                  remote_json = json.loads(res.stdout)
          except Exception:
              pass
          local_json = {'posted': []}
          if local_path.exists():
              try:
                  local_json = json.loads(local_path.read_text())
              except Exception:
                  pass
          merged = sorted(list(set(remote_json.get('posted', [])) | set(local_json.get('posted', []))))
          local_path.write_text(json.dumps({'posted': merged}, indent=2))
          "
          git reset origin/master
          git add posted_videos.json
          git diff --staged --quiet || git commit -m "chore: update posted state [skip ci]"
          git push origin HEAD:master

      - name: 🔄 Self-chain — trigger next run immediately
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # Always try to chain the next run, regardless of upload count
          # This keeps the bot running 24/7 without relying solely on cron
          if [ -z "$GH_PAT" ]; then
            echo "⚠️ GH_PAT secret is not set. Relying on cron schedule (every 5 min) for next run."
            echo "To enable instant self-chaining, add a PAT with 'repo' + 'workflow' scopes as GH_PAT secret."
            exit 0
          fi

          echo "Triggering next workflow run immediately..."
          # Small delay to avoid GitHub API rate limits on rapid self-chains
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/upload.yml/dispatches \
            -d '{"ref":"master"}')

          if [ "$HTTP_CODE" = "204" ]; then
            echo "✅ Next run triggered successfully!"
          else
            echo "⚠️ Self-chain trigger returned HTTP $HTTP_CODE. Next run will use cron schedule."
          fi
