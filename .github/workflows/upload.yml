name: 🤖 Auto Video Uploader

on:
  schedule:
    # Runs every 5 minutes (GitHub's minimum interval)
    # = 2 videos uploaded every 5 minutes = ~576 videos/day
    - cron: "*/5 * * * *"

  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  upload:
    name: Upload 2 Videos
    runs-on: ubuntu-latest
    timeout-minutes: 8     # kill if it hangs (safety net)

    permissions:
      contents: write      # needed to commit posted_videos.json back

    steps:
      # 1. Checkout the repo (including posted_videos.json for state)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the bot batch (uploads 2 videos)
      - name: Run batch upload
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python batch_run.py

      # 5. Commit posted_videos.json back so next run knows what was already posted
      - name: Save posted video state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_videos.json
          git diff --staged --quiet || git commit -m "chore: update posted videos state [skip ci]"
          git push
