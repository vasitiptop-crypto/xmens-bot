name: 🤖 Auto Video Uploader

on:
  schedule:
    # Every 5 minutes (GitHub's minimum interval)
    # = 10 videos every 5 min = ~2,880 videos/day
    - cron: "*/5 * * * *"

  # Manual trigger from Actions tab anytime
  workflow_dispatch:

# Prevent two runs from committing posted_videos.json at the same time
concurrency:
  group: video-upload
  cancel-in-progress: false   # let current run finish, queue the next

jobs:
  upload:
    name: Upload 10 Videos
    runs-on: ubuntu-latest
    timeout-minutes: 20       # 10 videos × ~90s each = ~15min max

    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Upload 10 videos to channel
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python batch_run.py

      - name: 💾 Save posted-video state back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master     # pull latest before push
          git add posted_videos.json
          git diff --staged --quiet || git commit -m "chore: update posted state [skip ci]"
          git push
